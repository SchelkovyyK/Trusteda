<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trust EDA</title>
    <link
      rel="shortcut icon"
      href="/static/logos/Logo.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/static/styles/reset.css" />
    <link rel="stylesheet" href="/static/styles/index.css" />
    <link rel="stylesheet" href="/static/styles/upload.css" />
  </head>
  <body>
    <header class="header">
      <a class="header__logo" href="#">
        <img src="/static/logos/Logo.svg" alt="Logo" />
        <h1 class="logo-text">

        <label class="theme-switch">
          <input type="checkbox" id="theme-checkbox" />
          <span class="slider"></span>
        </label>
        <svg
          id="icon-moon"
          width="800px"
          height="800px"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 22C17.5228 22 22 17.5228 22 12C22 11.5373 21.3065 11.4608 21.0672 11.8568C19.9289 13.7406 17.8615 15 15.5 15C11.9101 15 9 12.0899 9 8.5C9 6.13845 10.2594 4.07105 12.1432 2.93276C12.5392 2.69347 12.4627 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
            fill="black"
          />
        </svg>
      </nav>
    </header>

    <main class="main">
      <div class="upload-block">
        <div class="drop-zone" id="dropZone">
          <p>Drag the file here or click</p>
          <span id="file-name">No file selected</span>
        </div>

        <input type="file" id="fileInput" hidden />

        <button id="uploadBtn" type="button">Upload</button>

        <div class="selectors">
          <select id="col1"></select>
          <select id="col2"></select>
        </div>

        <button id="analyzeBtn" type="button" disabled>Analyze</button>

        <pre id="result"></pre>
      </div>
      <div id="fileList" class="file-list"></div>
    </main>
    <!-- Insert this directly below <pre id="result"></pre> -->
    <div
      class="table-container"
      id="tableContainer"
      style="display: none; margin-top: 20px; width: 100%; overflow-x: auto"
    >
      <table
        class="data-table"
        id="dataTable"
        style="width: 100%; border-collapse: collapse; text-align: left"
      >
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <script src="/static/scripts/index.js"></script>
    <script src="/static/scripts/upload.js"></script>
  </body>
</html>
